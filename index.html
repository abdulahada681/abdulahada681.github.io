<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Abdul Ahad - Web Developer Portfolio">
    <title>Abdul Ahad | 3D Web Developer Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Manrope:wght@400;500;700&display=swap');

        :root {
            --bg: #050505;
            --panel: #0f0f0f;
            --text: #f2f2f2;
            --muted: #9f9f9f;
            --line: #272727;
            --accent: #d5d5d5;
            --radius: 20px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            scroll-behavior: smooth;
            background: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
        }

        body {
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.08), transparent 45%),
                radial-gradient(circle at 90% 70%, rgba(255, 255, 255, 0.05), transparent 45%);
        }

        canvas#webgl {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.12;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 3px 3px;
            mix-blend-mode: overlay;
        }

        .site {
            position: relative;
            z-index: 2;
        }

        .nav {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: min(1120px, calc(100% - 24px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(8, 8, 8, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            backdrop-filter: blur(10px);
            z-index: 5;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            letter-spacing: 0.08em;
            font-size: 0.9rem;
        }

        .links {
            display: flex;
            gap: 18px;
            list-style: none;
        }

        .links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: var(--text);
        }

        section {
            width: min(1120px, calc(100% - 24px));
            margin: 0 auto;
            padding: 110px 0;
        }

        .hero {
            min-height: 100vh;
            display: grid;
            align-content: center;
            gap: 24px;
            padding-top: 140px;
        }

        .eyebrow {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.72rem;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.6rem, 9vw, 7rem);
            line-height: 0.95;
            letter-spacing: -0.03em;
            max-width: 12ch;
        }

        .outline {
            color: transparent;
            -webkit-text-stroke: 1px #e8e8e8;
        }

        .hero p {
            color: var(--muted);
            max-width: 62ch;
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            line-height: 1.7;
        }

        .hero-cta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--line);
            color: var(--text);
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            transition: transform 0.25s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.05);
        }

        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(12, 1fr);
        }

        .card {
            background: linear-gradient(145deg, rgba(25, 25, 25, 0.85), rgba(13, 13, 13, 0.85));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }

        .card h3 {
            font-family: 'Syne', sans-serif;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .card p {
            color: var(--muted);
            line-height: 1.7;
        }

        .about .a {
            grid-column: span 7;
        }

        .about .b {
            grid-column: span 5;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.6rem);
            margin-bottom: 24px;
            line-height: 1;
        }

        .skills-wrap {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .skill {
            padding: 22px;
        }

        .skill strong {
            font-family: 'Syne', sans-serif;
            display: block;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .projects {
            position: relative;
        }

        .project {
            margin-bottom: 16px;
            min-height: 220px;
        }

        .project small {
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .project h4 {
            font-family: 'Syne', sans-serif;
            font-size: 1.55rem;
            margin: 8px 0 10px;
        }

        .project .meta {
            color: #d0d0d0;
            font-size: 0.88rem;
        }

        .contact {
            padding-bottom: 80px;
        }

        .contact-card {
            text-align: center;
            padding: 56px 24px;
        }

        .contact a {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .footer {
            text-align: center;
            color: #9b9b9b;
            font-size: 0.82rem;
            padding: 0 12px 28px;
        }

        @media (max-width: 900px) {
            .about .a,
            .about .b {
                grid-column: span 12;
            }

            .skills-wrap {
                grid-template-columns: 1fr;
            }

            .links {
                display: none;
            }

            section {
                padding: 92px 0;
            }

            .hero {
                min-height: 88vh;
            }
        }
    </style>
</head>
<body>
    
    <h1>abdul ahad </h1>
    <p>pata nhi chala</p>
</body>
</html>
